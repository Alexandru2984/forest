<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Code Forest - Advanced Filtering</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; color: #fff; font-family: 'Courier New', Courier, monospace; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        h1 { margin: 0; font-size: 2em; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0, 255, 128, 0.5); color: #00ff80; }
        p { margin: 5px 0 0 0; color: #aaa; font-size: 0.9em; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: flex-start; pointer-events: auto; }
        
        /* Panel Styles */
        .glass-panel {
            background: rgba(10, 20, 15, 0.85);
            border: 1px solid #00ff80;
            box-shadow: 0 0 15px rgba(0, 255, 128, 0.4);
            padding: 15px;
            border-radius: 8px;
            backdrop-filter: blur(4px);
            margin-bottom: 15px;
        }

        .glass-panel label { margin-right: 5px; color: #00ff80; font-weight: bold; font-size: 0.9em; }
        .glass-input {
            background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(0, 255, 128, 0.5);
            color: #fff; padding: 6px 10px; border-radius: 4px; font-family: inherit;
            outline: none; transition: all 0.3s; margin-right: 15px;
        }
        .glass-input:focus { border-color: #00ff80; box-shadow: 0 0 10px rgba(0, 255, 128, 0.5) inset; }
        
        .glass-btn {
            background: #00ff80; color: #000; border: none; padding: 8px 15px;
            border-radius: 4px; font-family: inherit; font-weight: bold; cursor: pointer; transition: all 0.3s; text-transform: uppercase;
        }
        .glass-btn:hover { background: #fff; box-shadow: 0 0 15px #00ff80; }

        /* GitHub Input Form */
        #github-form { display: flex; align-items: center; }
        #github-input { width: 180px; }
        
        /* Filter Panel */
        #filter-panel { display: flex; flex-wrap: wrap; align-items: center; max-width: 800px; gap: 10px; }
        
        #status { align-self: flex-end; color: #00ff80; text-shadow: 0 0 5px #00ff80; background: rgba(0,255,128,0.1); padding: 5px 10px; border-radius: 4px; border: 1px solid rgba(0,255,128,0.3); }
        .error-msg { color: #ff3333 !important; text-shadow: 0 0 5px #ff3333 !important; background: rgba(255,51,51,0.1) !important; border-color: rgba(255,51,51,0.3) !important; }
        
        #controls-help { position: absolute; bottom: 20px; left: 20px; color: #888; font-size: 0.85em; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 5px; border: 1px solid #333; pointer-events: auto;}
        canvas { display: block; outline: none; }
        
        /* Tooltip Style */
        #tooltip {
            position: absolute; display: none; background: rgba(10, 20, 15, 0.9);
            border: 1px solid #00ff80; box-shadow: 0 0 15px rgba(0, 255, 128, 0.4);
            padding: 15px; border-radius: 8px; color: #fff; pointer-events: none; z-index: 100;
            font-size: 0.9em; backdrop-filter: blur(4px); min-width: 250px; max-width: 400px;
        }
        #tooltip strong { color: #fff; display: block; margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 4px; }
        .tt-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .tt-label { color: #888; margin-right: 15px; flex-shrink: 0; }
        .tt-value { text-align: right; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tt-action { margin-top: 10px; font-size: 0.8em; color: #ffcc00; text-align: center; border-top: 1px dashed rgba(255,204,0,0.3); padding-top: 5px; }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
      }
    </script>
</head>
<body>
    <div id="ui-layer">
        <div class="top-bar">
            <div>
                <h1 id="main-title">🌲 CODE_FOREST</h1>
                <p id="sub-title">v4.0.0 // FULL_HISTORY_&_FILTERS</p>
                
                <!-- Filter Controls -->
                <div id="filter-panel" class="glass-panel" style="margin-top: 15px; pointer-events: auto;">
                    <div>
                        <label for="filter-lang">LANG:</label>
                        <select id="filter-lang" class="glass-input">
                            <option value="">ALL</option>
                        </select>
                    </div>
                    <div>
                        <label for="filter-created">CREATED AFTER:</label>
                        <input type="date" id="filter-created" class="glass-input" />
                    </div>
                    <div>
                        <label for="filter-updated">UPDATED AFTER:</label>
                        <input type="date" id="filter-updated" class="glass-input" />
                    </div>
                    <button id="filter-btn" class="glass-btn">APPLY FILTERS</button>
                </div>
            </div>

            <!-- Target User -->
            <div id="github-form" class="glass-panel" style="pointer-events: auto;">
                <label for="github-input">TARGET_USER:</label>
                <input type="text" id="github-input" value="ALexandru2984" placeholder="e.g., torvalds" autocomplete="off" class="glass-input" style="margin-right: 10px;" />
                <label for="github-token" style="margin-left: 10px;">TOKEN (Opt):</label>
                <input type="password" id="github-token" placeholder="ghp_..." autocomplete="off" class="glass-input" style="margin-right: 10px; width: 120px;" />
                <button id="github-submit" class="glass-btn">FETCH</button>
            </div>
        </div>
        <div id="status">READY</div>
        <div id="controls-help">
            <strong>CAMERA CONTROLS:</strong><br>
            [W][A][S][D] - Move Camera<br>
            [Q][E] - Fly Up/Down<br>
            [Left Click + Drag] - Rotate<br>
            [Scroll] - Zoom<br>
            [Hover] - View Data<br>
            [Click Node] - Open Commit
        </div>
    </div>
    
    <div id="tooltip"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        let currentTargetUser = 'ALexandru2984';
        let allFetchedRepos = []; // To store global state for filtering

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.003); // Lighter fog for larger forests

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 4000);
        camera.position.set(0, 150, 250);

        const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        // --- POST PROCESSING (BLOOM) ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 1.8;
        bloomPass.radius = 0.5;

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- CONTROLS ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 + 0.1;
        controls.minDistance = 2;
        controls.maxDistance = 2000;
        controls.target.set(0, 10, 0);

        const keys = { w: false, a: false, s: false, d: false, q: false, e: false };
        window.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'SELECT') return;
            const k = e.key.toLowerCase();
            if (keys.hasOwnProperty(k)) keys[k] = true;
        });
        window.addEventListener('keyup', (e) => {
            const k = e.key.toLowerCase();
            if (keys.hasOwnProperty(k)) keys[k] = false;
        });

        // --- LIGHTS & ENV ---
        const ambientLight = new THREE.AmbientLight(0x334433);
        scene.add(ambientLight);
        
        const gridHelper = new THREE.GridHelper(1600, 800, 0x00ff80, 0x0a1a10);
        gridHelper.material.opacity = 0.15;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // --- GPU INSTANCING GLOBALS ---
        const languageColors = {
            'JavaScript': 0xf1e05a, 'TypeScript': 0x3178c6, 'Python': 0x3572A5,
            'Go': 0x00ADD8, 'Rust': 0xdea584, 'C++': 0xf34b7d, 'C#': 0x178600,
            'Java': 0xb07219, 'HTML': 0xe34c26, 'CSS': 0x563d7c, 'Shell': 0x89e051,
            'Elixir': 0x6e4a7e, 'Swift': 0xF05138, 'Ruby': 0x701516, 'PHP': 0x4F5D95,
            'C': 0x555555, 'Lua': 0x000080, 'Vue': 0x41b883, 'Jupyter Notebook': 0xDA5B0B
        };

        const geometries = [
            new THREE.IcosahedronGeometry(0.6, 0),
            new THREE.OctahedronGeometry(0.6, 0),
            new THREE.DodecahedronGeometry(0.6, 0)
        ];
        
        let instancedMeshes = [];
        let nodeDataMap = {}; 
        let branchLinesMesh = null;
        let trunkMesh = null;

        const forestGroup = new THREE.Group();
        scene.add(forestGroup);

        function clearForest() {
            instancedMeshes.forEach(mesh => {
                mesh.geometry.dispose();
                mesh.material.dispose();
                forestGroup.remove(mesh);
            });
            instancedMeshes = [];
            
            if(branchLinesMesh) {
                branchLinesMesh.geometry.dispose();
                branchLinesMesh.material.dispose();
                forestGroup.remove(branchLinesMesh);
            }
            if(trunkMesh) {
                trunkMesh.geometry.dispose();
                trunkMesh.material.dispose();
                forestGroup.remove(trunkMesh);
            }
            
            nodeDataMap = {};
        }

        function populateLanguageDropdown(repos) {
            const langSet = new Set();
            repos.forEach(r => langSet.add(r.language || 'Unknown'));
            
            const select = document.getElementById('filter-lang');
            // Keep the selected value if possible
            const prevVal = select.value;
            select.innerHTML = '<option value="">ALL</option>';
            
            Array.from(langSet).sort().forEach(l => {
                const opt = document.createElement('option');
                opt.value = l;
                opt.innerText = l.toUpperCase();
                if (l === prevVal) opt.selected = true;
                select.appendChild(opt);
            });
        }

        function buildForest(repos, targetUser) {
            clearForest();

            // Group repos by language
            const reposByLang = {};
            let totalCommits = 0;
            repos.forEach(r => { 
                const lang = r.language || 'Unknown';
                if (!reposByLang[lang]) reposByLang[lang] = [];
                reposByLang[lang].push(r);
                totalCommits += r.commits ? r.commits.length : 0; 
            });

            const langs = Object.keys(reposByLang);
            if(langs.length === 0) return;

            langs.sort((a,b) => reposByLang[b].length - reposByLang[a].length);

            // Setup InstancedMeshes
            for(let i=0; i<3; i++){
                const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                const im = new THREE.InstancedMesh(geometries[i], mat, Math.max(totalCommits, 1));
                im.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
                im.count = 0; 
                instancedMeshes.push(im);
                forestGroup.add(im);
            }

            const linePositions = new Float32Array(totalCommits * 6);
            const lineColors = new Float32Array(totalCommits * 6);
            let lineIndex = 0;

            const trunkGeo = new THREE.CylinderGeometry(0.4, 1.2, 1, 6);
            const trunkMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.5 });
            trunkMesh = new THREE.InstancedMesh(trunkGeo, trunkMat, Math.max(repos.length, 1));
            forestGroup.add(trunkMesh);

            const matrix = new THREE.Matrix4();
            const colorObj = new THREE.Color();
            let trunkCount = 0;

            const totalRepos = repos.length;
            let currentAngle = 0;

            langs.forEach((lang) => {
                const langRepos = reposByLang[lang];
                const baseColorHex = languageColors[lang] || 0x888888;
                const baseColor = new THREE.Color(baseColorHex);
                const hsl = {};
                baseColor.getHSL(hsl);

                const angleSlice = (langRepos.length / totalRepos) * (Math.PI * 2);
                const sectorMidAngle = currentAngle + (angleSlice / 2);

                langRepos.forEach((repo, repoIndex) => {
                    if(!repo.commits || repo.commits.length === 0) return;

                    // Expand radius mapping for more repos
                    const r = 30 + (Math.floor(repoIndex / 5) * 20) + Math.random() * 15;
                    const theta = sectorMidAngle + (Math.random() - 0.5) * (angleSlice * 0.85); 
                    
                    const x = Math.cos(theta) * r;
                    const z = Math.sin(theta) * r;

                    const hShift = (Math.random() - 0.5) * 0.15;
                    let newH = hsl.h + hShift;
                    if (newH < 0) newH += 1;
                    if (newH > 1) newH -= 1;
                    const newS = Math.max(0.5, Math.min(1.0, hsl.s + (Math.random() - 0.5) * 0.3));
                    const newL = Math.max(0.4, Math.min(0.8, hsl.l + (Math.random() - 0.5) * 0.4));
                    
                    colorObj.setHSL(newH, newS, newL);
                    const treeColorHex = colorObj.getHex();

                    const cCount = repo.commits.length;
                    const height = 4 + (cCount * 0.8);

                    matrix.identity();
                    matrix.makeScale(1, height, 1);
                    matrix.setPosition(x, height/2, z);
                    trunkMesh.setMatrixAt(trunkCount, matrix);
                    trunkMesh.setColorAt(trunkCount, colorObj);
                    trunkCount++;

                    const geomType = Math.floor(treeColorHex % 3);
                    const activeIM = instancedMeshes[geomType];

                    for(let j=0; j<cCount; j++) {
                        const commit = repo.commits[j];
                        const yPos = 2 + (j * (height - 2) / cCount) + (Math.random() * 2.0); 
                        const rad = 2 + Math.random() * 5 + (yPos * 0.1); 
                        const angle = Math.random() * Math.PI * 2;
                        
                        const nx = x + Math.cos(angle)*rad;
                        const ny = yPos;
                        const nz = z + Math.sin(angle)*rad;
                        
                        const branchStartX = x;
                        const branchStartY = yPos - 1.5;
                        const branchStartZ = z;

                        const id = activeIM.count;
                        matrix.identity();
                        matrix.setPosition(nx, ny, nz);
                        activeIM.setMatrixAt(id, matrix);
                        activeIM.setColorAt(id, colorObj);
                        
                        // Parse dates for tooltip display
                        const cDate = new Date(repo.created_at).toLocaleDateString();
                        const uDate = new Date(repo.updated_at).toLocaleDateString();

                        nodeDataMap[`${geomType}_${id}`] = {
                            rx: (Math.random() - 0.5) * 0.05,
                            ry: (Math.random() - 0.5) * 0.05,
                            baseY: ny,
                            offset: Math.random() * 100,
                            origMatrix: matrix.clone(),
                            
                            repo: repo.full_name,
                            language: lang,
                            created: cDate,
                            updated: uDate,
                            lineColorHex: treeColorHex,
                            commitHash: commit.hash,
                            message: commit.message,
                            url: commit.url
                        };
                        
                        activeIM.count++;

                        linePositions[lineIndex] = branchStartX;
                        linePositions[lineIndex+1] = branchStartY;
                        linePositions[lineIndex+2] = branchStartZ;
                        lineColors[lineIndex] = colorObj.r;
                        lineColors[lineIndex+1] = colorObj.g;
                        lineColors[lineIndex+2] = colorObj.b;
                        
                        linePositions[lineIndex+3] = nx;
                        linePositions[lineIndex+4] = ny;
                        linePositions[lineIndex+5] = nz;
                        lineColors[lineIndex+3] = colorObj.r;
                        lineColors[lineIndex+4] = colorObj.g;
                        lineColors[lineIndex+5] = colorObj.b;
                        
                        lineIndex += 6;
                    }
                });

                currentAngle += angleSlice;
            });

            instancedMeshes.forEach(im => {
                im.instanceMatrix.needsUpdate = true;
                im.instanceColor.needsUpdate = true;
            });
            trunkMesh.instanceMatrix.needsUpdate = true;
            trunkMesh.instanceColor.needsUpdate = true;

            if (lineIndex > 0) {
                const lineGeo = new THREE.BufferGeometry();
                lineGeo.setAttribute('position', new THREE.BufferAttribute(linePositions.slice(0, lineIndex), 3));
                lineGeo.setAttribute('color', new THREE.BufferAttribute(lineColors.slice(0, lineIndex), 3));
                
                const lineMat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.3 });
                branchLinesMesh = new THREE.LineSegments(lineGeo, lineMat);
                forestGroup.add(branchLinesMesh);
            }
        }

        // --- FILTERING LOGIC ---
        function applyFilters() {
            const langVal = document.getElementById('filter-lang').value;
            const createdVal = document.getElementById('filter-created').value;
            const updatedVal = document.getElementById('filter-updated').value;

            let filtered = allFetchedRepos.filter(r => {
                if (langVal && (r.language || 'Unknown') !== langVal) return false;
                if (createdVal && new Date(r.created_at) < new Date(createdVal)) return false;
                if (updatedVal && new Date(r.updated_at) < new Date(updatedVal)) return false;
                return true;
            });

            // Flash effect for UI transition
            bloomPass.strength = 3.5;
            setTimeout(() => { bloomPass.strength = 1.8; }, 400);

            buildForest(filtered, currentTargetUser);
            document.getElementById('status').innerText = `SHOWING ${filtered.length} / ${allFetchedRepos.length} REPOS`;
        }

        document.getElementById('filter-btn').addEventListener('click', applyFilters);

        // --- GITHUB API FETCHING (via GO PROXY) ---
        const statusEl = document.getElementById('status');
        
        async function fetchGitHubData(username, token) {
            statusEl.className = '';
            statusEl.innerText = 'FETCHING FROM GO PROXY (CONCURRENT)...';
            
            try {
                const headers = {};
                if (token && token.trim() !== '') {
                    headers['Authorization'] = `Bearer ${token.trim()}`;
                }
                const res = await fetch(`/api/github?user=${encodeURIComponent(username)}`, {
                    headers: headers
                });
                
                if (!res.ok) {
                    const text = await res.text();
                    throw new Error(`Proxy Error ${res.status}: ${text}`);
                }
                
                allFetchedRepos = await res.json();
                
                if (!allFetchedRepos || allFetchedRepos.length === 0) {
                    statusEl.innerText = `NO REPOS FOUND FOR [${username}]`;
                    statusEl.classList.add('error-msg');
                    return;
                }

                populateLanguageDropdown(allFetchedRepos);

                statusEl.innerText = `FOUND ${allFetchedRepos.length} REPOS. GROWING FOREST...`;
                
                // Reset Filters on new scan
                document.getElementById('filter-lang').value = "";
                document.getElementById('filter-created').value = "";
                document.getElementById('filter-updated').value = "";

                buildForest(allFetchedRepos, username);
                
                statusEl.innerText = `[LIVE] SYNCED ${allFetchedRepos.length} REPOS FOR: ${username.toUpperCase()}`;
                
            } catch (err) {
                statusEl.innerText = `ERROR: ${err.message}`;
                statusEl.classList.add('error-msg');
            }
        }

        // Removed initial auto-fetch to prevent instant rate limiting
        document.getElementById('status').innerText = 'AWAITING SCAN... ENTER USERNAME/TOKEN AND CLICK FETCH';

        // --- PARTICLES ---
        const particleCount = 6000;
        const particlesGeo = new THREE.BufferGeometry();
        const particlePos = new Float32Array(particleCount * 3);
        const particleVel = new Float32Array(particleCount);

        for(let i=0; i<particleCount; i++) {
            particlePos[i*3] = (Math.random() - 0.5) * 800;
            particlePos[i*3+1] = Math.random() * 400;
            particlePos[i*3+2] = (Math.random() - 0.5) * 800;
            particleVel[i] = -0.1 - Math.random() * 0.3;
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0x88ffcc, size: 0.3, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending });
        const particleSystem = new THREE.Points(particlesGeo, particleMat);
        scene.add(particleSystem);

        // --- RAYCASTING (Throttled for Performance) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hoveredNodeInfo = null; 
        const tooltip = document.getElementById('tooltip');

        let lastMouseTime = 0;
        let testMeshes = [];

        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            tooltip.style.left = (event.clientX + 20) + 'px';
            tooltip.style.top = (event.clientY + 20) + 'px';
            lastMouseTime = Date.now();
        }, false);

        window.addEventListener('click', (event) => {
            if (event.target.closest('.top-bar') || event.target.closest('#tooltip')) return;
            if (hoveredNodeInfo && hoveredNodeInfo.url) {
                window.open(hoveredNodeInfo.url, '_blank');
            }
        }, false);

        // --- UI LOGIC ---
        const ghInput = document.getElementById('github-input');
        const ghSubmit = document.getElementById('github-submit');

        const ghToken = document.getElementById('github-token');

        function triggerScan() {
            const val = ghInput.value.trim();
            const tokenVal = ghToken.value.trim();
            if(val.length > 0) {
                currentTargetUser = val;
                bloomPass.strength = 4.0;
                setTimeout(() => { bloomPass.strength = 1.8; }, 600);
                fetchGitHubData(currentTargetUser, tokenVal);
            }
        }
        ghSubmit.addEventListener('click', triggerScan);
        ghInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') triggerScan(); });

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();
        const dummyMatrix = new THREE.Matrix4();
        const dummyPos = new THREE.Vector3();
        const dummyQuat = new THREE.Quaternion();
        const dummyScale = new THREE.Vector3();

        let hoveredMeshId = -1;
        let hoveredInstanceId = -1;

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // Smooth WASD Fly Camera
            const panSpeed = 2.0;
            const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
            forward.y = 0; right.y = 0; 
            forward.normalize(); right.normalize();

            if (keys.w) { camera.position.addScaledVector(forward, panSpeed); controls.target.addScaledVector(forward, panSpeed); }
            if (keys.s) { camera.position.addScaledVector(forward, -panSpeed); controls.target.addScaledVector(forward, -panSpeed); }
            if (keys.d) { camera.position.addScaledVector(right, panSpeed); controls.target.addScaledVector(right, panSpeed); }
            if (keys.a) { camera.position.addScaledVector(right, -panSpeed); controls.target.addScaledVector(right, -panSpeed); }
            if (keys.q) { camera.position.y -= panSpeed; controls.target.y -= panSpeed; }
            if (keys.e) { camera.position.y += panSpeed; controls.target.y += panSpeed; }

            controls.update();
            forestGroup.rotation.y = Math.sin(time * 0.003) * 0.03;

            for(let i=0; i<instancedMeshes.length; i++){
                const im = instancedMeshes[i];
                if(im.count === 0) continue;
                
                for(let j=0; j<im.count; j++){
                    const data = nodeDataMap[`${i}_${j}`];
                    if(!data) continue;
                    
                    data.origMatrix.decompose(dummyPos, dummyQuat, dummyScale);
                    
                    // Levitate
                    dummyPos.y = data.baseY + Math.sin(time * 2 + data.offset) * 0.3;
                    
                    // Rotate
                    dummyQuat.x += data.rx; dummyQuat.y += data.ry;
                    dummyQuat.normalize();
                    
                    // Hover Scale
                    if (hoveredMeshId === i && hoveredInstanceId === j) {
                        dummyScale.set(2.5, 2.5, 2.5);
                    } else {
                        dummyScale.set(1, 1, 1);
                    }
                    
                    dummyMatrix.compose(dummyPos, dummyQuat, dummyScale);
                    im.setMatrixAt(j, dummyMatrix);
                }
                im.instanceMatrix.needsUpdate = true;
            }

            // Particles
            const pPositions = particleSystem.geometry.attributes.position.array;
            for(let i=0; i<particleCount; i++) {
                pPositions[i*3+1] += particleVel[i];
                if(pPositions[i*3+1] < 0) {
                    pPositions[i*3+1] = 400;
                    pPositions[i*3] = (Math.random() - 0.5) * 800;
                    pPositions[i*3+2] = (Math.random() - 0.5) * 800;
                }
            }
            particleSystem.geometry.attributes.position.needsUpdate = true;

            // Throttled Raycasting
            if (Date.now() - lastMouseTime < 100 && instancedMeshes.length > 0) {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(instancedMeshes);
                
                if (intersects.length > 0) {
                    const hit = intersects[0];
                    const objIndex = instancedMeshes.indexOf(hit.object);
                    const instId = hit.instanceId;
                    
                    if (hoveredMeshId !== objIndex || hoveredInstanceId !== instId) {
                        hoveredMeshId = objIndex;
                        hoveredInstanceId = instId;
                        
                        const ud = nodeDataMap[`${objIndex}_${instId}`];
                        if (ud) {
                            hoveredNodeInfo = ud;
                            const colorHex = '#' + ud.lineColorHex.toString(16).padStart(6, '0');
                            tooltip.innerHTML = `
                                <strong><span style="color:${colorHex}">●</span> "${ud.message}"</strong>
                                <div class="tt-row" style="margin-top: 8px;"><span class="tt-label">Repo:</span> <span class="tt-value">${ud.repo}</span></div>
                                <div class="tt-row"><span class="tt-label">Language:</span> <span class="tt-value" style="color:${colorHex}">${ud.language}</span></div>
                                <div class="tt-row"><span class="tt-label">Created:</span> <span class="tt-value">${ud.created}</span></div>
                                <div class="tt-row"><span class="tt-label">Updated:</span> <span class="tt-value">${ud.updated}</span></div>
                                <div class="tt-row"><span class="tt-label">Commit:</span> <span class="tt-value" style="color:#aaa">${ud.commitHash}</span></div>
                                <div class="tt-action">[ Click to open Commit ]</div>
                            `;
                            tooltip.style.border = `1px solid ${colorHex}`;
                            tooltip.style.boxShadow = `0 0 15px ${colorHex}88`;
                            tooltip.style.display = 'block';
                            document.body.style.cursor = 'pointer';
                        }
                    }
                } else {
                    hoveredMeshId = -1;
                    hoveredInstanceId = -1;
                    hoveredNodeInfo = null;
                    tooltip.style.display = 'none';
                    document.body.style.cursor = 'default';
                }
            }

            composer.render();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }, false);
    </script>
</body>
</html>
