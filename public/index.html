<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Code Forest - Next Gen</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; color: #fff; font-family: 'Courier New', Courier, monospace; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        h1 { margin: 0; font-size: 2em; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0, 255, 128, 0.5); color: #00ff80; }
        p { margin: 5px 0 0 0; color: #aaa; font-size: 0.9em; }
        #status { align-self: flex-end; color: #00ff80; text-shadow: 0 0 5px #00ff80; background: rgba(0,255,128,0.1); padding: 5px 10px; border-radius: 4px; border: 1px solid rgba(0,255,128,0.3); }
        .disconnected { color: #ff3333 !important; text-shadow: 0 0 5px #ff3333 !important; background: rgba(255,51,51,0.1) !important; border-color: rgba(255,51,51,0.3) !important; }
        #overlay { position: absolute; bottom: 20px; left: 20px; color: #888; font-size: 0.8em; }
        canvas { display: block; outline: none; }
    </style>
    <!-- Import Three.js from CDN -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
      }
    </script>
</head>
<body>
    <div id="ui-layer">
        <div>
            <h1>🌲 CODE_FOREST</h1>
            <p>v0.2.0 // BIOLUMINESCENT_RENDER_ENGINE</p>
        </div>
        <div id="status">INIT_CONNECTION...</div>
        <div id="overlay">Drag to rotate | Scroll to zoom</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.02);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 35);

        const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: false }); // Antialias off often better with Bloom
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        // --- POST PROCESSING (BLOOM) ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 1.5; // Glowing strength
        bloomPass.radius = 0.5;

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- CONTROLS ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 + 0.1; // Restrict underground view
        controls.minDistance = 5;
        controls.maxDistance = 150;
        controls.target.set(0, 5, 0);

        // --- LIGHTS ---
        const ambientLight = new THREE.AmbientLight(0x112211);
        scene.add(ambientLight);

        // --- ENVIRONMENT ---
        // High-tech glowing grid
        const gridHelper = new THREE.GridHelper(150, 150, 0x00ff80, 0x0a1a10);
        gridHelper.position.y = 0;
        gridHelper.material.opacity = 0.2;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // --- ORGANIC TREES (DATA STRUCTURES) ---
        const treeGroup = new THREE.Group();
        scene.add(treeGroup);

        const colors = [0x00ff80, 0x00ccff, 0xff00cc, 0xffcc00];
        
        function createAbstractTree(x, z) {
            const group = new THREE.Group();
            group.position.set(x, 0, z);

            // Trunk (Folder path depth)
            const height = 3 + Math.random() * 10;
            const trunkGeo = new THREE.CylinderGeometry(0.1, 0.3, height, 4);
            const trunkMat = new THREE.MeshBasicMaterial({ color: 0x113322, wireframe: true, transparent: true, opacity: 0.5 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = height / 2;
            group.add(trunk);

            // Leaves / Nodes (Files)
            const nodeCount = 4 + Math.floor(Math.random() * 20);
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            // Nodes are glowing crystals (Icosahedrons)
            const nodeGeo = new THREE.IcosahedronGeometry(0.4, 0);
            const nodeMat = new THREE.MeshBasicMaterial({ color: color });

            const nodes = [];
            for(let i=0; i<nodeCount; i++) {
                const node = new THREE.Mesh(nodeGeo, nodeMat);
                
                // Spread nodes around the top of the tree
                const r = 1 + Math.random() * 4;
                const theta = Math.random() * Math.PI * 2;
                const yOffset = height - 2 + Math.random() * 5;
                
                node.position.set(Math.cos(theta)*r, yOffset, Math.sin(theta)*r);
                
                // Metadata for animation
                node.userData = { 
                    rx: (Math.random() - 0.5) * 0.05, 
                    ry: (Math.random() - 0.5) * 0.05,
                    baseY: yOffset,
                    offset: Math.random() * 100
                };
                
                group.add(node);
                nodes.push(node);
            }

            // Connection lines (Branches connecting nodes to the trunk center)
            const lineMat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.2 });
            const trunkTop = new THREE.Vector3(0, height - 1, 0);
            
            nodes.forEach(node => {
                const pts = [trunkTop, node.position];
                const lineGeo = new THREE.BufferGeometry().setFromPoints(pts);
                const line = new THREE.Line(lineGeo, lineMat);
                group.add(line);
                node.userData.line = line; // Save ref to update line dynamically
            });

            treeGroup.add(group);
            return { group, nodes, trunkTop };
        }

        const allNodes = [];
        // Plant a denser forest
        for(let i=0; i<60; i++) {
            const r = Math.random() * 50;
            const theta = Math.random() * Math.PI * 2;
            const x = Math.cos(theta) * r;
            const z = Math.sin(theta) * r;
            const treeData = createAbstractTree(x, z);
            allNodes.push(...treeData.nodes.map(n => ({ node: n, trunkTop: treeData.trunkTop })));
        }

        // --- PARTICLES (DATA STREAM / COMMITS) ---
        const particleCount = 2000;
        const particlesGeo = new THREE.BufferGeometry();
        const particlePos = new Float32Array(particleCount * 3);
        const particleVel = [];

        for(let i=0; i<particleCount; i++) {
            particlePos[i*3] = (Math.random() - 0.5) * 150;
            particlePos[i*3+1] = Math.random() * 80;
            particlePos[i*3+2] = (Math.random() - 0.5) * 150;
            particleVel.push({ y: -0.02 - Math.random() * 0.08 }); // Falling speed
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0x00ff80, size: 0.15, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
        const particleSystem = new THREE.Points(particlesGeo, particleMat);
        scene.add(particleSystem);

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            controls.update();

            // Gently breathe the entire forest
            treeGroup.rotation.y = Math.sin(time * 0.05) * 0.1;

            // Animate each node (file)
            allNodes.forEach(item => {
                const n = item.node;
                n.rotation.x += n.userData.rx;
                n.rotation.y += n.userData.ry;
                
                // Levitation effect
                n.position.y = n.userData.baseY + Math.sin(time * 2 + n.userData.offset) * 0.4;
                
                // Update branch line to follow the node
                const positions = n.userData.line.geometry.attributes.position.array;
                positions[3] = n.position.x;
                positions[4] = n.position.y;
                positions[5] = n.position.z;
                n.userData.line.geometry.attributes.position.needsUpdate = true;
            });

            // Animate Matrix-style falling particles
            const positions = particleSystem.geometry.attributes.position.array;
            for(let i=0; i<particleCount; i++) {
                positions[i*3+1] += particleVel[i].y;
                if(positions[i*3+1] < 0) {
                    positions[i*3+1] = 80; // Reset to top
                    positions[i*3] = (Math.random() - 0.5) * 150;
                    positions[i*3+2] = (Math.random() - 0.5) * 150;
                }
            }
            particleSystem.geometry.attributes.position.needsUpdate = true;

            // Render using the Bloom Composer!
            composer.render();
        }
        animate();

        // --- RESIZE HANDLER ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- BACKEND CONNECTION ---
        const statusEl = document.getElementById('status');
        fetch('/api/')
            .then(response => response.json())
            .then(data => {
                statusEl.innerText = `[CONNECTED] ${data.status.toUpperCase()} // v${data.version}`;
            })
            .catch(error => {
                statusEl.innerText = '[ERR] BACKEND_OFFLINE';
                statusEl.classList.add('disconnected');
            });
    </script>
</body>
</html>
